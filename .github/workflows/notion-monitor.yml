name: Check Notion Update with Upstash Redis

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # 1. ตั้งค่า Environment Variables ให้กับ Job เพื่อให้ Node.js Script เข้าถึงได้
    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NOTION_KEY: ${{ secrets.NOTION_KEY }}
      DATABASE_ID: ${{ secrets.DATABASE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. ติดตั้ง Dependencies ที่จำเป็น
      - name: Install dependencies 📦
        run: bun install

      - name: Fetch and Compare Update Time 🔍
        id: deploy_trigger
        # 3. เรียกใช้ Node.js Script เพื่อจัดการ Logic ทั้งหมด
        run: bun run scripts/checkNotionUpdates.cjs
        # **Script จะ set output 'should_deploy' และ update Redis เอง**

      - name: Trigger Vercel Deploy Hook 🚀
        # 4. ใช้ Output ที่ตั้งค่าโดย Node.js Script
        if: steps.deploy_trigger.outputs.should_deploy == 'true'
        run: |
          echo "Triggering Vercel deployment..."
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Deployment Summary 📝
        run: |
          SHOULD_DEPLOY="${{ steps.deploy_trigger.outputs.should_deploy }}"
          CURRENT_TIME=$(date "+%Y-%m-%d %H:%M:%S %Z")

          SUMMARY_FILE=$GITHUB_STEP_SUMMARY

          echo "### 📄 Notion Update & Vercel Deploy Summary" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          if [ "$SHOULD_DEPLOY" = "true" ]; then

            echo "**Status:** ✅ **REDEPLOY Triggered**" >> $SUMMARY_FILE
            echo "- **Reason:** Found Notion content update" >> $SUMMARY_FILE

            if [ -n "${{ env.NEW_UPDATE_TIME }}" ]; then
              echo "- **Notion Update Time:** \`${{ env.NEW_UPDATE_TIME }}\`" >> $SUMMARY_FILE
            fi

            echo "- **Time:** \`${CURRENT_TIME}\`" >> $SUMMARY_FILE
            echo "✅ Vercel Deploy Hook was successfully triggered at $CURRENT_TIME"
          else
            echo "**Status:** ⏸️ **Deploy Skipped**" >> $SUMMARY_FILE
            echo "- **Reason:** Not found Notion update since last time" >> $SUMMARY_FILE
            echo "- **Time:** \`${CURRENT_TIME}\`" >> $SUMMARY_FILE
            echo "⏸️ Skipping Vercel deploy. No Notion updates detected."
          fi
